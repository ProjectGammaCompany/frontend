name: CD
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@v5.0.0

      - name: Set short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to DockerHub
        uses: docker/login-action@v3.6.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: create env file
        run: |
          cat <<EOF > .env.production
          VITE_APP_BASE_URL=http://api.hse-eduplay.ru/
          VITE_FILE_BASE_URL=http://api.hse-eduplay.ru/files/
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/eduplay-frontend:sha-${{ steps.vars.outputs.sha }}
            ${{ secrets.DOCKER_USERNAME }}/eduplay-frontend:latest

  update-manifests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Update image tags in kustomization.yaml
        run: |
          sed -i '/name: evgenbolat\/eduplay-frontend/{n;s#newTag: .*#newTag: sha-${{ steps.vars.outputs.sha }}#;}' k8s/app/kustomization.yaml

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add k8s/app/kustomization.yaml
          git commit -m "deploy: sha-${{ steps.vars.outputs.sha }}" || exit 0
          git push
