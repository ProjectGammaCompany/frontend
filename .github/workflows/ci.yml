name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  #Запуск линтера
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.13
          cache: "npm"

      - name: Run dependencies loading
        run: npm ci

      - name: Run linter
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-node@v6.0.0
        with:
            node-version: 22.13
            cache: "npm"

      - name: Run dependencies loading
        run: npm ci

      - name: Run tests
        run: VITE_APP_BASE_URL=https://something.com npm run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.13
          cache: "npm"

      - name: create env file
        run: |
          cat <<EOF > .env.production
          VITE_APP_BASE_URL=https://something.com
          EOF

      - name: Run dependencies loading
        run: npm ci

      - name: Run build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist
