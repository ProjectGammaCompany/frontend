name: Build and Deploy Frontend Workflow
on: workflow_dispatch 
  #push:
    #branches: [main]
jobs:
  #Запуск линтера
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0 
      - uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.13
          cache: 'npm'
          
      - name: Run dependencies loading
        run: npm ci
        
      - name: Run linter
        run: npm run lint
        
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.13
          cache: 'npm'
      - name: Run dependencies loading
        run: npm ci
        
      - name: Run tests
        run: npm run test
 
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.13
          cache: 'npm'
      - name: Run dependencies loading
        run: npm ci

      - name: Run build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5.0.0
      - name: Log in to Github Container Regisrty
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with: 
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:latest
            ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
